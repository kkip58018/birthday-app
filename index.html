<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🎂 Happy Birthday! ✨</title>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Canvas Confetti Library for extra celebration -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #2b1b2c 0%, #1a0f1d 100%);
      font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
      overflow-x: hidden;
      color: #fff;
    }

    #particle-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .app-container {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .screen {
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
      text-align: center;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .screen.active {
      display: flex;
      opacity: 1;
    }

    /* Countdown */
    .countdown-number {
      font-size: 12rem;
      font-weight: 800;
      color: #ffb6c1;
      text-shadow: 0 0 30px #ff69b4, 0 0 60px #ff1493;
      line-height: 1;
      animation: pulse 1s infinite;
    }
    .countdown-label {
      font-size: 2rem;
      letter-spacing: 8px;
      color: #ffe4e1;
      text-transform: uppercase;
      margin-top: 1rem;
    }

    /* Messages */
    .big-message {
      font-size: 5.5rem;
      font-weight: 800;
      color: #ffe4f2;
      text-shadow: 0 0 20px #ff69b4;
      line-height: 1.3;
    }
    .sub-message {
      font-size: 4.5rem;
      font-weight: 600;
      color: #ffb6c1;
      margin-top: 0.5rem;
    }
    .name-message {
      font-size: 5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ffb6c1, #ff69b4);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-top: 1.5rem;
      filter: drop-shadow(0 0 20px #ff1493);
    }

    /* Album */
    .gallery-title {
      font-size: 2.4rem;
      margin-bottom: 1.5rem;
      color: #ffe4e1;
      font-weight: 600;
      letter-spacing: 2px;
    }
    .album-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }
    .main-photo-container {
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
      border-radius: 32px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
      border: 2px solid rgba(255, 192, 203, 0.6);
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), 0 0 40px rgba(255, 105, 180, 0.3);
      overflow: hidden;
      padding: 16px;
    }
    .photo-frame-large {
      width: 100%;
      aspect-ratio: 1 / 1.1;
      border-radius: 20px;
      overflow: hidden;
    }
    .photo-frame-large img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }
    .album-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      margin-top: 24px;
    }
    .nav-btn {
      background: rgba(255, 182, 193, 0.2);
      border: 2px solid #ffb6c1;
      color: #ffb6c1;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      font-size: 2rem;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    .nav-btn:hover {
      background: #ffb6c1;
      color: #1a0f1d;
      transform: scale(1.1);
      box-shadow: 0 0 25px #ff69b4;
    }
    .photo-counter {
      font-size: 1.3rem;
      color: #ffd1dc;
      font-weight: 500;
    }
    .thumbnails {
      display: flex;
      gap: 10px;
      margin-top: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .thumbnail {
      width: 60px;
      height: 60px;
      border-radius: 12px;
      border: 2px solid rgba(255,192,203,0.5);
      overflow: hidden;
      cursor: pointer;
      opacity: 0.7;
      transition: all 0.2s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    .thumbnail.active-thumb {
      opacity: 1;
      border: 3px solid #ff69b4;
      transform: scale(1.05);
      box-shadow: 0 0 15px #ff69b4;
    }
    .thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Heart shape gallery – 7x7 grid for a perfect heart */
    .heart-gallery {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    .heart-title {
      font-size: 2.5rem;
      font-weight: bold;
      color: #ffe4f2;
      text-shadow: 0 0 15px #ff1493;
      margin-bottom: 0.5rem;
    }
    .heart-shape {
      display: grid;
      grid-template-columns: repeat(7, 70px);
      grid-template-rows: repeat(7, 70px);
      gap: 8px;
      justify-content: center;
      margin: 10px 0;
    }
    .heart-cell {
      width: 70px;
      height: 70px;
      border-radius: 16px;
      background: rgba(255, 192, 203, 0.15);
      backdrop-filter: blur(4px);
      border: 2px solid #ffb6c1;
      overflow: hidden;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
      transition: transform 0.2s;
    }
    .heart-cell:hover {
      transform: scale(1.05);
    }
    .heart-cell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .heart-cell.empty {
      background: transparent;
      border: none;
      backdrop-filter: none;
      box-shadow: none;
    }
    .heart-caption {
      font-size: 2.2rem;
      font-weight: bold;
      color: #ffe4f2;
      text-shadow: 0 0 20px #ff1493;
      margin-top: 5px;
    }

    .btn {
      background: rgba(255, 182, 193, 0.2);
      border: 2px solid #ffb6c1;
      color: white;
      padding: 14px 36px;
      font-size: 1.3rem;
      border-radius: 60px;
      backdrop-filter: blur(8px);
      cursor: pointer;
      margin-top: 2rem;
      font-weight: 600;
      transition: 0.3s;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    .btn:hover {
      background: #ffb6c1;
      color: #1e0f1a;
      box-shadow: 0 0 30px #ff69b4;
    }

    /* Floating heart animation for final screen */
    .floating-hearts {
      position: fixed;
      bottom: 20px;
      left: 0;
      right: 0;
      pointer-events: none;
      z-index: 20;
      text-align: center;
    }
    .floating-heart {
      display: inline-block;
      font-size: 2rem;
      animation: floatUp 4s infinite ease-in-out;
      margin: 0 10px;
      opacity: 0.8;
    }
    @keyframes floatUp {
      0% { transform: translateY(0) rotate(0deg); opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 1; }
      100% { transform: translateY(-100px) rotate(20deg); opacity: 0; }
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.05); opacity: 1; text-shadow: 0 0 40px #ff69b4; }
      100% { transform: scale(1); opacity: 0.9; }
    }

    @keyframes fadeSlide {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 700px) {
      .heart-shape { grid-template-columns: repeat(7, 45px); grid-template-rows: repeat(7, 45px); }
      .heart-cell { width: 45px; height: 45px; }
      .big-message { font-size: 3.8rem; }
      .sub-message { font-size: 3.2rem; }
      .name-message { font-size: 3.5rem; }
      .countdown-number { font-size: 8rem; }
    }
  </style>
</head>
<body>

  <canvas id="particle-canvas"></canvas>

  <div class="app-container">
    <!-- COUNTDOWN SCREEN -->
    <div id="countdownScreen" class="screen active">
      <div id="countdownDisplay" class="countdown-number">5</div>
      <div class="countdown-label">Get ready...</div>
    </div>

    <!-- MESSAGE SCREEN -->
    <div id="messageScreen" class="screen">
      <div id="happyText" class="big-message" style="opacity:0;">Happy</div>
      <div id="birthdayText" class="sub-message" style="opacity:0;">Birthday</div>
      <div id="nameText" class="name-message" style="opacity:0;"></div>
    </div>

    <!-- ALBUM SCREEN -->
    <div id="galleryScreen" class="screen">
      <div class="gallery-title"><i class="fas fa-images" style="margin-right: 14px;"></i> Sweet Memories</div>
      <div class="album-wrapper">
        <div class="main-photo-container">
          <div class="photo-frame-large">
            <img id="galleryImage" src="" alt="Memory">
          </div>
        </div>
        <div class="album-nav">
          <button class="nav-btn" id="prevPhotoBtn"><i class="fas fa-chevron-left"></i></button>
          <span class="photo-counter" id="photoCounter">1 / 6</span>
          <button class="nav-btn" id="nextPhotoBtn"><i class="fas fa-chevron-right"></i></button>
        </div>
        <div class="thumbnails" id="thumbnailContainer"></div>
      </div>
    </div>

    <!-- HEART SCREEN -->
    <div id="heartScreen" class="screen">
      <div class="heart-gallery">
        <div class="heart-title"><i class="fas fa-heart" style="color:#ff69b4;"></i> With All My Love <i class="fas fa-heart" style="color:#ff69b4;"></i></div>
        <div id="heartGrid" class="heart-shape"></div>
        <div class="heart-caption">
          <span id="finalNameDisplay"></span> 💖
        </div>
        <button class="btn" id="restartBtn"><i class="fas fa-redo-alt" style="margin-right: 8px;"></i> Celebrate Again</button>
      </div>
      <!-- Floating hearts as extra touch -->
      <div class="floating-hearts" id="floatingHeartsContainer"></div>
    </div>
  </div>

  <script>
    (function(){
      "use strict";

      // ---------- CONFIGURATION ----------
      const CONFIG = {
        celebrantName: "Sophia",  // 👈 CHANGE THIS TO THE BIRTHDAY PERSON'S NAME
      };

      // Photo album images (replace with your own)
      const PHOTO_ALBUM = [
        "https://images.pexels.com/photos/1702373/pexels-photo-1702373.jpeg?auto=compress&cs=tinysrgb&w=600", // cake
        "https://images.pexels.com/photos/1028714/pexels-photo-1028714.jpeg?auto=compress&cs=tinysrgb&w=600", // balloons
        "https://images.pexels.com/photos/1198802/pexels-photo-1198802.jpeg?auto=compress&cs=tinysrgb&w=600", // flowers
        "https://images.pexels.com/photos/3768131/pexels-photo-3768131.jpeg?auto=compress&cs=tinysrgb&w=600", // gift
        "https://images.pexels.com/photos/5877419/pexels-photo-5877419.jpeg?auto=compress&cs=tinysrgb&w=600", // confetti
        "https://images.pexels.com/photos/1721604/pexels-photo-1721604.jpeg?auto=compress&cs=tinysrgb&w=600"  // candles
      ];

      // Heart shape pattern: 7x7 grid, true = filled cell (image), false = empty
      // This pattern forms a classic heart shape.
      const HEART_PATTERN = [
        [false, true,  true,  true,  true,  true,  false], // row0
        [true,  true,  true,  true,  true,  true,  true ], // row1
        [true,  true,  true,  true,  true,  true,  true ], // row2
        [true,  true,  true,  true,  true,  true,  true ], // row3
        [false, true,  true,  true,  true,  true,  false], // row4
        [false, false, true,  true,  true,  false, false], // row5
        [false, false, false, true,  false, false, false]  // row6
      ];

      // Images for heart cells (romantic vibes)
      const HEART_IMAGES = [
        "https://images.pexels.com/photos/931177/pexels-photo-931177.jpeg?auto=compress&cs=tinysrgb&w=200", // roses
        "https://images.pexels.com/photos/1624487/pexels-photo-1624487.jpeg?auto=compress&cs=tinysrgb&w=200", // strawberries
        "https://images.pexels.com/photos/1485630/pexels-photo-1485630.jpeg?auto=compress&cs=tinysrgb&w=200", // heart cookies
        "https://images.pexels.com/photos/6690142/pexels-photo-6690142.jpeg?auto=compress&cs=tinysrgb&w=200", // pink petals
        "https://images.pexels.com/photos/1211918/pexels-photo-1211918.jpeg?auto=compress&cs=tinysrgb&w=200", // chocolates
        "https://images.pexels.com/photos/1648377/pexels-photo-1648377.jpeg?auto=compress&cs=tinysrgb&w=200", // heart balloons
        "https://images.pexels.com/photos/1648379/pexels-photo-1648379.jpeg?auto=compress&cs=tinysrgb&w=200", // pink cake
        "https://images.pexels.com/photos/1410236/pexels-photo-1410236.jpeg?auto=compress&cs=tinysrgb&w=200", // cupcake
        "https://images.pexels.com/photos/2072179/pexels-photo-2072179.jpeg?auto=compress&cs=tinysrgb&w=200", // love letter
        "https://images.pexels.com/photos/1029599/pexels-photo-1029599.jpeg?auto=compress&cs=tinysrgb&w=200", // teddy bear
      ];

      const celebrantName = CONFIG.celebrantName;
      
      // DOM elements
      const countdownScreen = document.getElementById('countdownScreen');
      const messageScreen = document.getElementById('messageScreen');
      const galleryScreen = document.getElementById('galleryScreen');
      const heartScreen = document.getElementById('heartScreen');
      const countdownDisplay = document.getElementById('countdownDisplay');
      const happyText = document.getElementById('happyText');
      const birthdayText = document.getElementById('birthdayText');
      const nameText = document.getElementById('nameText');
      const galleryImage = document.getElementById('galleryImage');
      const photoCounter = document.getElementById('photoCounter');
      const finalNameDisplay = document.getElementById('finalNameDisplay');
      const heartGrid = document.getElementById('heartGrid');
      const thumbnailContainer = document.getElementById('thumbnailContainer');
      const prevBtn = document.getElementById('prevPhotoBtn');
      const nextBtn = document.getElementById('nextPhotoBtn');
      const restartBtn = document.getElementById('restartBtn');

      let currentPhotoIndex = 0;
      let countdownInterval = null;

      nameText.textContent = celebrantName;
      finalNameDisplay.textContent = celebrantName;

      // ---------- FALLING PINK PARTICLES ----------
      const canvas = document.getElementById('particle-canvas');
      const ctx = canvas.getContext('2d');
      let width, height;
      let particles = [];
      
      function initParticles() {
        const count = 70;
        for (let i = 0; i < count; i++) {
          particles.push({
            x: Math.random() * width,
            y: Math.random() * height - height,
            size: Math.random() * 12 + 4,
            speedY: Math.random() * 2 + 1.2,
            speedX: (Math.random() - 0.5) * 0.8,
            color: `hsla(${330 + Math.random() * 30}, 80%, 70%, ${0.6 + Math.random()*0.3})`,
            shape: Math.random() > 0.5 ? 'circle' : 'heart'
          });
        }
      }

      function drawParticles() {
        ctx.clearRect(0, 0, width, height);
        for (let p of particles) {
          ctx.beginPath();
          ctx.fillStyle = p.color;
          if (p.shape === 'circle') {
            ctx.arc(p.x, p.y, p.size/2, 0, Math.PI*2);
            ctx.fill();
          } else {
            ctx.font = `${p.size}px "Segoe UI Emoji", "Apple Color Emoji", sans-serif`;
            ctx.fillStyle = p.color;
            ctx.fillText('💖', p.x - p.size/2, p.y + p.size/3);
          }
          p.y += p.speedY;
          p.x += p.speedX;
          if (p.y > height + 50) { p.y = -20; p.x = Math.random() * width; }
          if (p.x > width + 30) p.x = -20;
          if (p.x < -30) p.x = width + 20;
        }
        requestAnimationFrame(drawParticles);
      }

      function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        particles = [];
        initParticles();
      }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();
      drawParticles();

      // ---------- COUNTDOWN ----------
      function startCountdown() {
        let count = 5;
        countdownDisplay.textContent = count;
        countdownInterval = setInterval(() => {
          count--;
          if (count >= 0) countdownDisplay.textContent = count;
          if (count < 0) {
            clearInterval(countdownInterval);
            switchScreen(countdownScreen, messageScreen);
            showMessages();
          }
        }, 1000);
      }

      function switchScreen(from, to) {
        from.classList.remove('active');
        to.classList.add('active');
      }

      function showMessages() {
        happyText.style.animation = 'none'; happyText.offsetHeight; happyText.style.animation = 'fadeSlide 0.8s forwards';
        setTimeout(() => {
          birthdayText.style.animation = 'none'; birthdayText.offsetHeight; birthdayText.style.animation = 'fadeSlide 0.8s forwards';
        }, 900);
        setTimeout(() => {
          nameText.style.animation = 'none'; nameText.offsetHeight; nameText.style.animation = 'fadeSlide 0.8s forwards';
        }, 1800);
        setTimeout(() => {
          switchScreen(messageScreen, galleryScreen);
          buildThumbnails();
          loadGalleryImage(0);
        }, 3500);
      }

      // ---------- ALBUM ----------
      function buildThumbnails() {
        thumbnailContainer.innerHTML = '';
        PHOTO_ALBUM.forEach((src, idx) => {
          const thumb = document.createElement('div');
          thumb.className = 'thumbnail' + (idx === 0 ? ' active-thumb' : '');
          const img = document.createElement('img');
          img.src = src;
          img.alt = `Memory ${idx+1}`;
          thumb.appendChild(img);
          thumb.addEventListener('click', () => loadGalleryImage(idx));
          thumbnailContainer.appendChild(thumb);
        });
      }

      function updateThumbnailActive(index) {
        document.querySelectorAll('.thumbnail').forEach((thumb, i) => {
          thumb.classList.toggle('active-thumb', i === index);
        });
      }

      function loadGalleryImage(index) {
        if (!PHOTO_ALBUM.length) return;
        currentPhotoIndex = (index + PHOTO_ALBUM.length) % PHOTO_ALBUM.length;
        galleryImage.src = PHOTO_ALBUM[currentPhotoIndex];
        photoCounter.textContent = `${currentPhotoIndex+1} / ${PHOTO_ALBUM.length}`;
        updateThumbnailActive(currentPhotoIndex);
      }

      function handleNextPhoto() {
        if (currentPhotoIndex === PHOTO_ALBUM.length - 1) {
          switchScreen(galleryScreen, heartScreen);
          buildHeartGrid();
          triggerCelebration();  // 🎉 extra surprise: confetti + floating hearts
        } else {
          loadGalleryImage(currentPhotoIndex + 1);
        }
      }

      prevBtn.addEventListener('click', () => loadGalleryImage(currentPhotoIndex - 1));
      nextBtn.addEventListener('click', handleNextPhoto);

      // ---------- HEART SHAPE (proper 7x7 heart) ----------
      function buildHeartGrid() {
        heartGrid.innerHTML = '';
        let imgIndex = 0;
        for (let r = 0; r < HEART_PATTERN.length; r++) {
          for (let c = 0; c < HEART_PATTERN[r].length; c++) {
            const cell = document.createElement('div');
            cell.className = 'heart-cell';
            if (HEART_PATTERN[r][c]) {
              const img = document.createElement('img');
              img.src = HEART_IMAGES[imgIndex % HEART_IMAGES.length];
              img.alt = 'love';
              cell.appendChild(img);
              imgIndex++;
            } else {
              cell.classList.add('empty');
            }
            heartGrid.appendChild(cell);
          }
        }
      }

      // ---------- EXTRA CELEBRATION: Confetti + Floating Hearts ----------
      function triggerCelebration() {
        // Confetti blast
        confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 }, colors: ['#ff69b4', '#ffb6c1', '#ff1493', '#ffffff'] });
        setTimeout(() => confetti({ particleCount: 100, spread: 80, origin: { y: 0.5, x: 0.3 } }), 200);
        setTimeout(() => confetti({ particleCount: 100, spread: 80, origin: { y: 0.5, x: 0.7 } }), 400);
        
        // Floating hearts animation
        const container = document.getElementById('floatingHeartsContainer');
        container.innerHTML = '';
        for (let i = 0; i < 12; i++) {
          const heart = document.createElement('span');
          heart.className = 'floating-heart';
          heart.innerHTML = ['💖','💗','💓','💕','💘','❤️'][i % 6];
          heart.style.animationDelay = `${i * 0.3}s`;
          heart.style.fontSize = `${1.5 + Math.random()}rem`;
          container.appendChild(heart);
        }
      }

      // Restart
      restartBtn.addEventListener('click', () => {
        clearInterval(countdownInterval);
        switchScreen(heartScreen, countdownScreen);
        countdownDisplay.textContent = '5';
        happyText.style.opacity = '0';
        birthdayText.style.opacity = '0';
        nameText.style.opacity = '0';
        currentPhotoIndex = 0;
        startCountdown();
      });

      // Preload images
      window.addEventListener('load', () => {
        [...PHOTO_ALBUM, ...HEART_IMAGES].forEach(src => { const img = new Image(); img.src = src; });
        startCountdown();
      });

    })();
  </script>
</body>
</html>
